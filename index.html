<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Underdead — Em Breve</title>
    <meta name="description" content="Underdead - Country Roots. Street Soul. EST. 2016. Em breve.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background-color: #0A0A0A;
            color: #F5F5DC;
            font-family: 'Montserrat', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 40px 20px;
            overflow: hidden;
        }
        .container {
            max-width: 600px;
            width: 100%;
            animation: fadeIn 2s ease-in;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .logo {
            width: 250px;
            height: 250px;
            margin: 0 auto 40px;
            border-radius: 50%;
            background: #F5F5DC;
            padding: 15px;
            box-shadow: 0 0 60px rgba(27, 42, 74, 0.3);
        }
        .logo img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
        .coming-soon {
            font-family: 'Playfair Display', serif;
            font-size: 3rem;
            font-weight: 900;
            letter-spacing: 8px;
            text-transform: uppercase;
            margin-bottom: 20px;
            color: #F5F5DC;
        }
        .tagline {
            font-size: 1.1rem;
            font-weight: 300;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: #8B9A6B;
            margin-bottom: 15px;
        }
        .slogan {
            font-size: 0.95rem;
            font-weight: 400;
            color: #CC5500;
            letter-spacing: 2px;
            margin-bottom: 40px;
        }
        .divider {
            width: 80px;
            height: 2px;
            background: #5A3E2B;
            margin: 0 auto 40px;
        }
        .social {
            margin-top: 30px;
        }
        .social a {
            display: inline-block;
            color: #F5F5DC;
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 600;
            letter-spacing: 2px;
            text-transform: uppercase;
            padding: 12px 30px;
            border: 1px solid #5A3E2B;
            transition: all 0.3s ease;
        }
        .social a:hover {
            background: #5A3E2B;
            color: #F5F5DC;
        }
        .est {
            font-size: 0.8rem;
            color: #704214;
            letter-spacing: 3px;
            margin-top: 50px;
        }
        .barbed-wire {
            color: #1B2A4A;
            font-size: 1.5rem;
            letter-spacing: 5px;
            margin: 20px 0;
            opacity: 0.5;
        }
        @media (max-width: 480px) {
            .logo {
                width: 180px;
                height: 180px;
            }
            .coming-soon {
                font-size: 2rem;
                letter-spacing: 5px;
            }
            .tagline {
                font-size: 0.9rem;
            }
        }
    </style>
