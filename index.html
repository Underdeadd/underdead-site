    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background-color: #0A0A0A;
            color: #F5F5DC;
            font-family: 'Montserrat', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 40px 20px;
        }
        .container {
            max-width: 500px;
            width: 100%;
            animation: fadeIn 2s ease-in;
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        .logo-arc {
            width: 320px;
            max-width: 90%;
            margin: 0 auto 30px;
        }
        .logo-arc svg {
            width: 100%;
            overflow: visible;
        }
        .barbed-wire {
            margin: 0 auto 40px;
            width: 300px;
            max-width: 80%;
            opacity: 0.6;
        }
        .barbed-wire img {
            width: 100%;
            height: auto;
            display: block;
        }
        .coming-soon {
            font-family: 'Montserrat', sans-serif;
            font-size: 1.6rem;
            font-weight: 300;
            letter-spacing: 10px;
            text-transform: uppercase;
            margin-bottom: 25px;
            color: #F5F5DC;
        }
        .slogan {
            font-size: 1rem;
            font-weight: 600;
            color: #F5F5DC;
            letter-spacing: 4px;
            text-transform: uppercase;
        }
        .est {
            font-size: 0.7rem;
            color: #5A3E2B;
            letter-spacing: 4px;
            margin-top: 60px;
            opacity: 0.7;
        }
        @media (max-width: 480px) {
            .logo-arc {
                width: 260px;
            }
            .coming-soon {
                font-size: 1.2rem;
                letter-spacing: 6px;
            }
            .barbed-wire {
                width: 240px;
            }
        }
    </style>
